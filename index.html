
<!DOCTYPE html>
<html>
<head>
<title>Classroom Scheduling System</title>
<!-- ...existing code... -->
<style>
    :root{
        --bg-1: #e6fff7;
        --bg-2: #f7fff9;
        --card: #ffffff;
        --muted: #6b7280;
        --accent-start: #2b8a78;
        --accent-end: #246f61;
        --radius: 14px;
        --shadow: 0 10px 30px rgba(20,20,30,0.08);
        --max-width: 420px;
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    html,body{height:100%;margin:0}
    body.login-body{
        display:flex;
        align-items:center;
        justify-content:center;
        padding:2rem;
        background:linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        color:#0f172a;
    }

    .login-container{
        width:100%;
        max-width:var(--max-width);
        background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.95));
        border-radius:var(--radius);
        padding:2rem;
        box-shadow:var(--shadow);
        border:1px solid rgba(15,23,42,0.04);
        text-align:center;
    }

    .login-container h2{
        margin:0 0 .15rem 0;
        font-size:1.25rem;
        letter-spacing:0.02em;
    }
    .login-container h3{
        margin:0 0 1rem 0;
        font-size:0.95rem;
        color:var(--muted);
        font-weight:500;
    }

    form{margin-top:1rem; text-align:left}
    form label{
        display:block;
        font-size:.85rem;
        margin-bottom:.35rem;
        color:var(--muted);
        font-weight:600;
    }

    input[type="text"],
    input[type="password"]{
        width:100%;
        padding:.75rem .9rem;
        border-radius:10px;
        border:1px solid rgba(15,23,42,0.06);
        background: #fff;
        font-size:0.95rem;
        margin-bottom:0.9rem;
        transition:box-shadow .12s ease, transform .06s ease;
    }
    input[type="text"]:focus,
    input[type="password"]:focus{
        outline: none;
        box-shadow: 0 6px 18px rgba(43,138,120,0.08);
        transform: translateY(-1px);
        border-color: rgba(36,111,97,0.9);
    }

    button[type="submit"]{
        width:100%;
        padding:.85rem;
        border-radius:10px;
        border:0;
        cursor:pointer;
        font-weight:700;
        color:#fff;
        background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
        box-shadow: 0 8px 24px rgba(43,138,120,0.14);
        font-size:1rem;
        margin-top:.25rem;
        transition: transform .12s ease, box-shadow .12s ease;
    }
    button[type="submit"]:hover{ transform: translateY(-3px); }

    /* small helper */
    .login-foot{
        margin-top:1rem;
        font-size:.85rem;
        color:var(--muted);
    }

    /* responsive tweaks */
    @media (max-width:420px){
        .login-container{ padding:1.25rem; border-radius:12px }
    }
</style>
<link rel="stylesheet" href="loginpage.css">
<!-- ...existing code... -->
</head>

<body class="login-body">

<div class="login-container">
    <h2>Villagers Montessori College</h2>
    <h3>Classroom Scheduling System</h3>

    <form action="dashboard.html">
        <label>Username</label>
        <input type="text" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
